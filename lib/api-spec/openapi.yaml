openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI-Powered Ingredient Scanner & Risk Analyzer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ingredients
    description: Ingredient lookup and analysis
  - name: scan
    description: Scan and analyze product ingredient lists
  - name: history
    description: Scan history management
  - name: stats
    description: Dashboard statistics and summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ingredients:
    get:
      operationId: listIngredients
      tags: [ingredients]
      summary: List all ingredients in the database
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or code
        - name: riskLevel
          in: query
          schema:
            type: string
            enum: [low, medium, high]
          description: Filter by risk level
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"

  /ingredients/{id}:
    get:
      operationId: getIngredient
      tags: [ingredients]
      summary: Get a single ingredient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ingredient detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
        "404":
          description: Not found

  /scan:
    post:
      operationId: scanIngredients
      tags: [scan]
      summary: Analyze a list of ingredient text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List scan history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of past scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanHistoryEntry"
    post:
      operationId: saveHistory
      tags: [history]
      summary: Save a scan result to history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanHistoryInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryEntry"

  /history/{id}:
    get:
      operationId: getHistory
      tags: [history]
      summary: Get a specific scan history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: History entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteHistory
      tags: [history]
      summary: Delete a scan history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/risk-distribution:
    get:
      operationId: getRiskDistribution
      tags: [stats]
      summary: Get risk distribution across all ingredients
      responses:
        "200":
          description: Risk breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskDistribution"

  /stats/top-risky:
    get:
      operationId: getTopRiskyIngredients
      tags: [stats]
      summary: Get the most frequently flagged high-risk ingredients
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top risky ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopRiskyItem"

  /stats/categories:
    get:
      operationId: getCategoryBreakdown
      tags: [stats]
      summary: Get ingredient count breakdown by category
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Ingredient:
      type: object
      required: [id, name, riskLevel]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [low, medium, high]
        description:
          type: ["string", "null"]
        safetyNotes:
          type: ["string", "null"]
        profileFlags:
          type: ["string", "null"]
          description: Comma-separated list of sensitive profiles (children, pregnant, elderly, allergen)
        source:
          type: ["string", "null"]
          description: E-number, INS number, CI code, or common name

    ScanInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Raw ingredient list text from a product label
        profile:
          type: string
          enum: [general, children, pregnant, elderly, allergen]
          default: general

    ScanResult:
      type: object
      required: [ingredients, grade, riskScore, summary]
      properties:
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/MatchedIngredient"
        grade:
          type: string
          enum: [A, B, C, D, F]
        riskScore:
          type: number
          description: 0-100 risk score
        summary:
          type: string
        profile:
          type: string
        lowCount:
          type: integer
        mediumCount:
          type: integer
        highCount:
          type: integer
        unknownCount:
          type: integer

    MatchedIngredient:
      type: object
      required: [raw, riskLevel]
      properties:
        raw:
          type: string
          description: Original text from the ingredient list
        matched:
          type: ["object", "null"]
          $ref: "#/components/schemas/Ingredient"
        riskLevel:
          type: string
          enum: [low, medium, high, unknown]
        warning:
          type: ["string", "null"]

    ScanHistoryInput:
      type: object
      required: [productName, rawText, grade, riskScore]
      properties:
        productName:
          type: string
        rawText:
          type: string
        grade:
          type: string
        riskScore:
          type: number
        profile:
          type: string
        resultJson:
          type: string
          description: JSON-serialized ScanResult

    ScanHistoryEntry:
      type: object
      required: [id, productName, grade, riskScore, createdAt]
      properties:
        id:
          type: integer
        productName:
          type: string
        rawText:
          type: string
        grade:
          type: string
        riskScore:
          type: number
        profile:
          type: ["string", "null"]
        resultJson:
          type: ["string", "null"]
        createdAt:
          type: string

    StatsSummary:
      type: object
      required: [totalIngredients, totalScans, avgRiskScore, highRiskCount]
      properties:
        totalIngredients:
          type: integer
        totalScans:
          type: integer
        avgRiskScore:
          type: number
        highRiskCount:
          type: integer
        mediumRiskCount:
          type: integer
        lowRiskCount:
          type: integer

    RiskDistribution:
      type: object
      required: [low, medium, high, unknown]
      properties:
        low:
          type: integer
        medium:
          type: integer
        high:
          type: integer
        unknown:
          type: integer

    TopRiskyItem:
      type: object
      required: [name, count, riskLevel]
      properties:
        name:
          type: string
        code:
          type: ["string", "null"]
        count:
          type: integer
        riskLevel:
          type: string

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer
