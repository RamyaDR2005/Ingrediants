kind = "web"
previewPath = "/"
title = "AI Ingredient Scanner"
version = "1.0.0"
id = "artifacts/ingredient-scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18394

[services.development]
run = "pnpm --filter @workspace/ingredient-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ingredient-scanner", "run", "build" ]
publicDir = "artifacts/ingredient-scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18394"
BASE_PATH = "/"
